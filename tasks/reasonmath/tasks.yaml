# LR-13 verification:
# Battery capacity = 75 kWh
# Start at 90% => 75 * 0.90 = 67.5 kWh
# Leg 1 use = 180 km * 20 kWh / 100 km = 36 kWh
# After leg 1 => 67.5 - 36 = 31.5 kWh
# Charge to 80% => target battery energy = 75 * 0.80 = 60 kWh
# Energy added to battery = 60 - 31.5 = 28.5 kWh
# Charger is 95% efficient, so grid energy purchased = 28.5 / 0.95 = 30 kWh
# Leg 2 use = 120 km * 25 kWh / 100 km = 30 kWh
# Arrival battery = 60 - 30 = 30 kWh
- id: LR-13
  prompt: |-
    An EV with a 75 kWh battery starts a trip at 90% charge.

    Leg 1:
    - Drive 180 km
    - Consumption is 20 kWh per 100 km

    At a charging stop, the driver charges the battery back up to 80%.
    The charger has 5% loss, meaning only 95% of the grid energy reaches the battery.

    Leg 2:
    - Drive 120 km
    - Consumption is 25 kWh per 100 km

    How many kWh are purchased from the grid at the charging stop, and how many kWh remain in the battery on arrival?

    Return the final line exactly in this format:
    ANSWER: grid_kwh=<number>; arrival_kwh=<number>
  max_tokens: 512
  metadata:
    title: EV Trip Energy and Charging Losses
    difficulty: hard
    capability_tags: [multi-step, energy, travel, percentages, unit-rates]
    verifier_type: tolerance
    answer_type: structured
    expected_fields:
      grid_kwh: "30"
      arrival_kwh: "30"
    tolerance: 0.01

# LR-14 verification:
# Deck area = 18 ft * 12 ft = 216 sq ft
# Add 12% waste: 216 * 1.12 = 241.92 sq ft
# Each board covers 5.5 in * 12 ft
# 5.5 in = 5.5/12 ft, so coverage per board = (5.5/12) * 12 = 5.5 sq ft
# Boards needed = 241.92 / 5.5 = 43.9854545..., so 44 boards
# Packs needed = ceil(44 / 10) = 5
# Total cost = 5 * $84 = $420
- id: LR-14
  prompt: |-
    A builder is covering a rectangular deck that measures 18 ft by 12 ft.
    Each deck board is 12 ft long and 5.5 inches wide.
    The builder wants 12% extra material for waste.
    Boards are sold only in packs of 10, and each pack costs $84.

    How many packs must be purchased, and what is the total cost?

    Return the final line exactly in this format:
    ANSWER: packs=<integer>; cost=<number>
  max_tokens: 512
  metadata:
    title: Deck Board Pack Purchase
    difficulty: hard
    capability_tags: [multi-step, geometry, unit-conversion, construction, costing]
    verifier_type: tolerance
    answer_type: structured
    expected_fields:
      packs: "5"
      cost: "420"
    tolerance: 0.01

# LR-15 verification:
# Hotel = 3 nights * €129 = €387
# City tax = 3 nights * €4.50 = €13.50
# Train = 2 tickets * €78 = €156
# Total euro expenses = 387 + 13.5 + 156 = €556.50
# Convert to USD at 1.08 => 556.5 * 1.08 = $601.02
# Meal stipend = 2 people * 4 days * $35 = $280
# Total reimbursement = 601.02 + 280 = $881.02
- id: LR-15
  prompt: |-
    A company is reimbursing a two-person creator team for a conference trip.

    Euro-denominated expenses:
    - Hotel: 3 nights at €129 per night
    - City tax: €4.50 per night
    - Train tickets: 2 tickets at €78 each

    USD-denominated stipend:
    - Meals: $35 per person per day for 4 days

    The company converts all euro expenses at 1 EUR = 1.08 USD.

    What is the USD value of the euro expenses, and what is the total reimbursement in USD after adding the meal stipend?

    Return the final line exactly in this format:
    ANSWER: euro_usd=<number>; total_usd=<number>
  max_tokens: 512
  metadata:
    title: Conference Travel Reimbursement
    difficulty: hard
    capability_tags: [multi-step, travel, currency-conversion, finance, budgeting]
    verifier_type: tolerance
    answer_type: structured
    expected_fields:
      euro_usd: "601.02"
      total_usd: "881.02"
    tolerance: 0.01
