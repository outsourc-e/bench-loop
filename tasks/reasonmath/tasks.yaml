# LR-04 verification:
# Bays 1-5 with trucks Atlas, Beacon, Comet, Drift, Ember.
# Comet is bay 4.
# Beacon is immediately right of Drift, so pair is either (1,2) or (2,3).
# Ember is at an end. If Ember were bay 1, Atlas would have to be bay 3 (left of Comet and not next to Ember),
# leaving no valid place for the Drift/Beacon pair. So Ember = bay 5.
# Atlas must be left of Comet and not next to Ember, so Atlas cannot be bay 3 and must be bay 1.
# Therefore Drift = bay 2 and Beacon = bay 3.
# Final order: Atlas, Drift, Beacon, Comet, Ember
- id: LR-04
  prompt: |-
    Five delivery trucks, Atlas, Beacon, Comet, Drift, and Ember, are parked in loading bays 1 through 5 from left to right.
    Each truck occupies one different bay.

    Clues:
    1. Comet is in bay 4.
    2. Beacon is immediately to the right of Drift.
    3. Ember is parked at one of the ends.
    4. Atlas is somewhere to the left of Comet.
    5. Atlas is not next to Ember.

    What is the order of the trucks from bay 1 to bay 5?

    Return the final line exactly in this format:
    ANSWER: Atlas, Drift, Beacon, Comet, Ember
  max_tokens: 512
  metadata:
    title: Loading Bay Order Deduction
    difficulty: medium
    capability_tags: [logic, constraints, sequencing, logistics]
    verifier_type: exact
    answer_type: sequence
    expected_answer: "Atlas, Drift, Beacon, Comet, Ember"
    answer_aliases:
      - "Atlas Drift Beacon Comet Ember"
      - "atlas, drift, beacon, comet, ember"

# LR-05 verification:
# Quill finished immediately after Nova.
# Pyre finished before Nova.
# Pyre is not 4th, Rune is not 1st.
# Nova cannot be 1st because then Pyre could not be before Nova.
# Nova cannot be 3rd because then Quill would be 4th, leaving Pyre before Nova and Rune not 1st impossible.
# So Nova = 2nd, Quill = 3rd, Pyre = 1st, Rune = 4th.
# Final order: Pyre, Nova, Quill, Rune
- id: LR-05
  prompt: |-
    Four players, Nova, Pyre, Quill, and Rune, finished 1st through 4th in a gaming tournament.

    Clues:
    1. Quill finished immediately after Nova.
    2. Pyre finished before Nova.
    3. Pyre did not finish 4th.
    4. Rune did not finish 1st.

    What was the finishing order from 1st to 4th?

    Return the final line exactly in this format:
    ANSWER: Pyre, Nova, Quill, Rune
  max_tokens: 512
  metadata:
    title: Tournament Placement Logic
    difficulty: medium
    capability_tags: [logic, constraints, sequencing, gaming]
    verifier_type: exact
    answer_type: sequence
    expected_answer: "Pyre, Nova, Quill, Rune"
    answer_aliases:
      - "Pyre Nova Quill Rune"
      - "pyre, nova, quill, rune"

# LR-06 verification:
# Framing is Tuesday.
# Roofing is immediately before Electrical.
# Electrical is after Framing, so Roofing/Electrical cannot be Tue/Wed? Actually it can be Wed/Thu or Thu/Fri.
# Plumbing is not Thursday.
# If Roofing/Electrical were Thu/Fri, Plumbing would need to be Wed and Electrical would be Fri, which is valid,
# but then Roofing would not be immediately before Electrical with Framing Tue? Wait that still works.
# To make the solution unique, use clue 4 below: Electrical is on Thursday or later? No.
# Final intended reasoning with given clues:
# - Framing = Tue.
# - Roofing immediately before Electrical.
# - Plumbing not Thu.
# - Electrical is not Fri.
# So Roofing/Electrical must be Wed/Thu.
# Then Plumbing = Fri.
# Final day order: Framing, Roofing, Electrical, Plumbing
- id: LR-06
  prompt: |-
    A contractor must schedule four inspections from Tuesday through Friday, one per day:
    Framing, Roofing, Electrical, and Plumbing.

    Clues:
    1. Framing is on Tuesday.
    2. Roofing is immediately before Electrical.
    3. Plumbing is not on Thursday.
    4. Electrical is not on Friday.

    What is the inspection order from Tuesday to Friday?

    Return the final line exactly in this format:
    ANSWER: Framing, Roofing, Electrical, Plumbing
  max_tokens: 512
  metadata:
    title: Inspection Schedule Constraints
    difficulty: easy
    capability_tags: [logic, constraints, scheduling, construction]
    verifier_type: exact
    answer_type: sequence
    expected_answer: "Framing, Roofing, Electrical, Plumbing"
    answer_aliases:
      - "Framing Roofing Electrical Plumbing"
      - "framing, roofing, electrical, plumbing"

