# LR-01 verification:
# 48 tiles * 7.5 in * 15 in = 5,400 sq in
# Add 8% waste: 5,400 * 1.08 = 5,832 sq in
# Convert to sq ft: 5,832 / 144 = 40.5 sq ft
- id: LR-01
  prompt: |-
    A food truck floor is being retiled with 48 rectangular vinyl tiles. Each tile measures 7.5 inches by 15 inches.
    The installer wants to buy 8% extra material for cuts and waste.

    How many square feet of tile should be purchased in total?

    Return the final line exactly in this format:
    ANSWER: <number>
  max_tokens: 512
  metadata:
    title: Food Truck Tile Coverage With Waste
    difficulty: easy
    capability_tags: [arithmetic, unit-conversion, geometry, construction]
    verifier_type: tolerance
    answer_type: numeric
    expected_answer: "40.5"
    answer_aliases: ["40.50", "40.5 sq ft", "40.50 sq ft"]
    tolerance: 0.01

