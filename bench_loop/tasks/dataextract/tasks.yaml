  - content: 'Extract the product details and reviewer''s assessment from this review:


      ★★★★☆

      Reviewed by: TechDad_42 on Feb 28, 2026

      Verified Purchase


      Bought the XR-7500 Pro noise-cancelling headphones for my daily commute. Was deciding between these and the Sony WH-1000XM5 ($348) but went with these since they were on sale for $279 (normally $329).
      Battery life is honestly amazing — I get about 38 hours on a single charge vs the 30 hours Sony claims. The ANC is good but not quite as good as my old Bose QC45s tbh. Sound quality is excellent for
      the price point. They fold flat which is great for my bag.


      One complaint: the app (v3.2.1) is buggy on Android 14. Crashes when trying to customize EQ. Not a dealbreaker since the default sound profile is great.


      Weight: 254g. Bluetooth 5.3. USB-C charging.


      Would I recommend? Yeah, especially at the sale price. Best value under $300 IMO.


      Fields: product_name, product_price_paid, product_price_original, rating_stars, reviewer_name, battery_life_hours, weight_grams, bluetooth_version, charging_type, competitor_1_name, competitor_1_price,
      competitor_2_name, complaint, recommendation'
    role: user
  suite: dataextract
  title: Product Review with Embedded Specs
  validation:
    expected:
      battery_life_hours: 38
      bluetooth_version: '5.3'
      charging_type: USB-C
      competitor_1_name: Sony WH-1000XM5
      competitor_1_price: 348
      competitor_2_name: Bose QC45s
      complaint: the app (v3.2.1) is buggy on Android 14. Crashes when trying to customize EQ.
