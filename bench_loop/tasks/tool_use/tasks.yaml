  - id: tool-multi-step-reasoning
    suite: tool_use
    messages:
      - role: system
        content: "You are a helpful assistant. Use the provided tools when appropriate."
      - role: user
        content: "What's the average order value for user 42?"
    config:
      max_tokens: 1024
      temperature: 0.0
      tools:
        - type: function
          function:
            name: get_user
            description: Fetch a user by ID
            parameters:
              type: object
              properties:
                user_id:
                  type: integer
              required: [user_id]
        - type: function
          function:
            name: get_orders
            description: Fetch orders for a user
            parameters:
              type: object
              properties:
                user_id:
                  type: integer
              required: [user_id]
        - type: function
          function:
            name: calculate
            description: Evaluate a math expression
            parameters:
              type: object
              properties:
                expression:
                  type: string
              required: [expression]
    validation:
