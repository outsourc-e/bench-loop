  - id: tool-structured-json
    suite: tool_use
    messages:
      - role: system
        content: "You are a helpful assistant. Use the provided tools when appropriate."
      - role: user
        content: "Schedule a team standup for tomorrow at 9am in Room B with Alice, Bob, and Charlie."
    config:
      max_tokens: 1024
      temperature: 0.0
      tools:
        - type: function
          function:
            name: create_event
            description: Create a calendar event
            parameters:
              type: object
              properties:
                title:
                  type: string
                date:
                  type: string
                location:
                  type: string
                attendees:
                  type: array
                  items:
                    type: string
              required: [title, date, location, attendees]
    validation:
      expected_tool: create_event
      expected_args:
        title: team standup
        date: tomorrow at 9am
        location: Room B
        attendees:
          - Alice
          - Bob
          - Charlie
