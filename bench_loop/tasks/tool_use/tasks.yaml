tasks:
  - id: tool-weather-lookup
    suite: tool_use
    messages:
      - role: system
        content: "You are a helpful assistant. Use the provided tools when appropriate."
      - role: user
        content: "What's the weather in Tokyo?"
    config:
      max_tokens: 1024
      temperature: 0.0
      tools:
        - type: function
          function:
            name: get_weather
            description: Get current weather for a city
            parameters:
              type: object
              properties:
                city:
                  type: string
                  description: City name
                unit:
                  type: string
                  enum: [celsius, fahrenheit]
                  description: Temperature unit
              required: [city]
    validation:
      expected_tool: get_weather
      expected_args:
        city: Tokyo
        unit: celsius

  - id: tool-calculator
    suite: tool_use
    messages:
      - role: system
        content: "You are a helpful assistant. Use the provided tools when appropriate."
      - role: user
        content: "What's 15% of 842?"
    config:
      max_tokens: 1024
      temperature: 0.0
      tools:
        - type: function
          function:
            name: calculate
            description: Evaluate a math expression
            parameters:
              type: object
              properties:
                expression:
                  type: string
                  description: Math expression to evaluate
              required: [expression]
    validation:
      expected_tool: calculate
      expected_args:
        expression: "0.15 * 842"

  - id: tool-multi-tool-select
    suite: tool_use
    messages:
      - role: system
        content: "You are a helpful assistant. Use the provided tools when appropriate."
      - role: user
        content: "Find recent news about SpaceX."
    config:
      max_tokens: 1024
      temperature: 0.0
      tools:
        - type: function
          function:
            name: search_web
            description: Search the web for recent information
            parameters:
              type: object
              properties:
                query:
                  type: string
                  description: Search query
              required: [query]
        - type: function
          function:
            name: get_weather
            description: Get weather for a city
            parameters:
              type: object
              properties:
                city:
                  type: string
                  description: City name
              required: [city]
        - type: function
          function:
            name: send_email
            description: Send an email
            parameters:
              type: object
              properties:
                to:
                  type: string
                subject:
                  type: string
                body:
                  type: string
              required: [to, subject, body]
    validation:
      expected_tool: search_web
      expected_args:
        query: SpaceX

  - id: tool-abstention
    suite: tool_use
    messages:
      - role: system
        content: "You are a helpful assistant. Use the provided tools when appropriate."
      - role: user
        content: "What is the meaning of life?"
    config:
      max_tokens: 1024
      temperature: 0.0
      tools:
        - type: function
