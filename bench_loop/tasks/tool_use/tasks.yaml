  - id: tool-file-operations
    suite: tool_use
    messages:
      - role: system
        content: "You are a helpful assistant. Use the provided tools when appropriate."
      - role: user
        content: "List all files in the /tmp directory."
    config:
      max_tokens: 1024
      temperature: 0.0
      tools:
        - type: function
          function:
            name: read_file
            description: Read a file from disk
            parameters:
              type: object
              properties:
                path:
                  type: string
              required: [path]
        - type: function
          function:
            name: write_file
            description: Write a file to disk
            parameters:
              type: object
              properties:
                path:
                  type: string
                content:
                  type: string
              required: [path, content]
        - type: function
          function:
            name: list_directory
            description: List files in a directory
            parameters:
              type: object
              properties:
                path:
                  type: string
              required: [path]
    validation:
      expected_tool: list_directory
      expected_args:
        path: /tmp

  - id: tool-database-query
    suite: tool_use
    messages:
      - role: system
        content: "You are a helpful assistant. Use the provided tools when appropriate."
      - role: user
        content: "How many users signed up this month?"
    config:
      max_tokens: 1024
      temperature: 0.0
      tools:
        - type: function
          function:
            name: query_db
            description: Run a read-only SQL query
            parameters:
              type: object
              properties:
                sql:
                  type: string
              required: [sql]
        - type: function
          function:
            name: insert_record
            description: Insert a record into a table
            parameters:
              type: object
              properties:
                table:
                  type: string
                data:
                  type: object
              required: [table, data]
    validation:
      expected_tool: query_db
      expected_args:
