  - content: 'You''re on a game show with 4 doors. Behind one door is a car. Behind the other 3 doors are goats. You pick Door 1.


      The host knows where the car is. The host always opens exactly 2 goat doors among the 3 doors you did not choose, leaving exactly 1 unopened alternative door besides your original choice. If the host
      has more than one valid pair of goat doors to open, the host chooses uniformly at random among those valid pairs.


      In this run, the host opens Door 3 and Door 4, both goats, and offers you the chance to switch to Door 2.


      What is the probability of winning the car if you switch to Door 2? What if you stay with Door 1?'
    role: user
  suite: reasonmath
  title: Monty Hall Variant with Explicit Host Rule
  validation: {}
