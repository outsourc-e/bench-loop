tasks:
- category: A
  config:
    max_tokens: 2048
    temperature: 0.0
    tools: &id001
    - function:
        description: Search the web for current information
        name: web_search
        parameters:
          additionalProperties: false
          properties:
            max_results:
              default: 5
              type: integer
            query:
              type: string
          required:
          - query
          type: object
      type: function
    - function:
        description: Get current weather for a specific location
        name: get_weather
        parameters:
          additionalProperties: false
          properties:
            location:
              type: string
            units:
              default: celsius
              enum:
              - celsius
              - fahrenheit
              type: string
          required:
          - location
          type: object
      type: function
    - function:
        description: Perform mathematical calculations
        name: calculator
        parameters:
          additionalProperties: false
          properties:
            expression:
              type: string
          required:
          - expression
          type: object
      type: function
    - function:
        description: Send an email to a recipient
        name: send_email
        parameters:
          additionalProperties: false
          properties:
            attachments:
              default: []
              items:
                type: string
              type: array
            body:
              type: string
            subject:
              type: string
            to:
              type: string
          required:
          - to
          - subject
          - body
          type: object
      type: function
    - function:
        description: Search for files by name or content
        name: search_files
        parameters:
          additionalProperties: false
          properties:
            file_type:
              default: any
              enum:
              - pdf
              - docx
              - xlsx
              - any
              type: string
            query:
              type: string
          required:
          - query
          type: object
      type: function
    - function:
        description: Read the contents of a specific file
        name: read_file
        parameters:
          additionalProperties: false
          properties:
            file_id:
              type: string
          required:
          - file_id
          type: object
      type: function
    - function:
        description: Create a new calendar event
        name: create_calendar_event
        parameters:
          additionalProperties: false
          properties:
            attendees:
              default: []
              items:
                type: string
              type: array
            date:
              format: YYYY-MM-DD
              type: string
            duration_minutes:
              default: 60
              type: integer
            time:
              format: HH:MM
              type: string
            title:
              type: string
          required:
          - title
          - date
          - time
          type: object
      type: function
    - function:
        description: Look up contacts by name or group
        name: get_contacts
        parameters:
          additionalProperties: false
          properties:
            query:
              type: string
          required:
          - query
          type: object
      type: function
    - function:
        description: Translate text from one language to another
        name: translate_text
        parameters:
          additionalProperties: false
          properties:
            source_language:
              type: string
            target_language:
              type: string
            text:
              type: string
          required:
          - text
          - source_language
          - target_language
          type: object
      type: function
    - function:
        description: Get the current stock price for a ticker symbol
        name: get_stock_price
        parameters:
          additionalProperties: false
          properties:
            ticker:
              type: string
          required:
          - ticker
          type: object
      type: function
    - function:
        description: Set a reminder for a future time
        name: set_reminder
        parameters:
          additionalProperties: false
          properties:
            datetime:
              format: ISO 8601
              type: string
            message:
              type: string
          required:
          - message
          - datetime
          type: object
      type: function
    - function:
        description: Execute a code snippet and return the output
        name: run_code
        parameters:
          additionalProperties: false
          properties:
            code:
              type: string
            language:
              enum:
              - python
              - javascript
              type: string
          required:
          - language
          - code
          type: object
      type: function
  id: tc-01
  messages:
  - content: 'You are a helpful assistant with access to the tools provided.


